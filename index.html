<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <title>Escritório – Seu Espaço Criativo</title>
    <script>
      try {
        var saved = JSON.parse(localStorage.getItem("escritorio_theme") || "{}");
        var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var mode = saved.theme_mode || (saved.dark_mode ? "dark" : "system");
        var shouldDark = mode === "dark" || (mode === "system" && systemDark);
        if (shouldDark) document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
